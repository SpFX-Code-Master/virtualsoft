<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VirtualSoft - Single Page Website</title>
    <style>
      :root {
        --bg: #f8f2e8;
        --paper: #fff9f0;
        --ink: #1f2a2e;
        --muted: #5d676b;
        --accent: #0f766e;
        --accent-2: #f97316;
        --line: #d7cec0;
        --shadow: 0 16px 32px rgba(31, 42, 46, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 12% 8%, rgba(249, 115, 22, 0.2), transparent 35%),
          radial-gradient(circle at 82% 24%, rgba(15, 118, 110, 0.2), transparent 38%),
          linear-gradient(180deg, #fffdf8, var(--bg));
        color: var(--ink);
      }

      .page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(980px, 100%);
        background: linear-gradient(180deg, rgba(255, 249, 240, 0.96), rgba(255, 253, 248, 0.95));
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: var(--shadow);
        overflow: hidden;
        animation: riseIn 700ms ease-out both;
      }

      .hero {
        display: grid;
        gap: 20px;
        grid-template-columns: 1.2fr 1fr;
        padding: 48px;
      }

      .tag {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.8);
        color: var(--muted);
        letter-spacing: 0.08em;
        font-size: 0.75rem;
        text-transform: uppercase;
      }

      h1 {
        margin: 14px 0 12px;
        font-size: clamp(2rem, 5vw, 3.6rem);
        line-height: 1.05;
      }

      .subtitle {
        margin: 0;
        max-width: 56ch;
        color: var(--muted);
        line-height: 1.6;
      }

      .actions {
        margin-top: 26px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .btn {
        border: 0;
        border-radius: 10px;
        padding: 12px 18px;
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.2s ease, opacity 0.2s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn-primary {
        background: var(--accent);
        color: #f6fffd;
      }

      .btn-secondary {
        background: transparent;
        border: 1px solid var(--line);
        color: var(--ink);
      }

      .visual {
        align-self: center;
        background: repeating-linear-gradient(
          -30deg,
          #fff,
          #fff 14px,
          rgba(249, 115, 22, 0.12) 14px,
          rgba(249, 115, 22, 0.12) 28px
        );
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 18px;
        min-height: 240px;
        display: grid;
        align-content: center;
      }

      .stat {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 10px 14px;
        align-items: center;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent-2);
        box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.2);
      }

      .count {
        font-size: clamp(2.1rem, 7vw, 3.4rem);
        font-weight: 800;
        line-height: 1;
      }

      .note {
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .footer {
        border-top: 1px solid var(--line);
        padding: 18px 48px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .spark {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 2px;
        background: var(--accent);
        transform: rotate(14deg);
      }

      @keyframes riseIn {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 800px) {
        .hero {
          grid-template-columns: 1fr;
          padding: 30px;
        }

        .footer {
          padding: 14px 30px;
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <div class="hero">
          <div>
            <span class="tag">VirtualSoft</span>
            <h1>One page. Clear story. Strong first impression.</h1>
            <p class="subtitle">
              This single-file website is ready to publish. It includes responsive design,
              custom styling, and a tiny interactive counter so your page feels alive from the first load.
            </p>
            <div class="actions">
              <button class="btn btn-primary" id="boostBtn">Boost Counter</button>
              <button class="btn btn-secondary" onclick="window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' })">
                Jump to Footer
              </button>
            </div>
          </div>

          <aside class="visual">
            <div class="stat">
              <span class="dot" aria-hidden="true"></span>
              <div>
                <div class="count" id="counter">128</div>
                <div class="note">Visitors engaged today</div>
              </div>
            </div>
          </aside>
        </div>

        <div class="footer">
          <span><span class="spark" aria-hidden="true"></span> Built as a single HTML file</span>
          <span id="today"></span>
        </div>
      </section>
    </main>

    <script>
      const counterEl = document.getElementById("counter");
      const boostBtn = document.getElementById("boostBtn");
      const todayEl = document.getElementById("today");
      let count = Number(counterEl.textContent);

      boostBtn.addEventListener("click", () => {
        count += Math.floor(Math.random() * 7) + 1;
        counterEl.textContent = String(count);
      });

      todayEl.textContent = new Date().toLocaleDateString(undefined, {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric"
      });
    </script>
  </body>
</html>
